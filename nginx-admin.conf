server {
      listen 80;
      server_name localhost;
      root /usr/share/nginx/html;

      # ✅ 关键修复：代理所有 /springboot01u2zqkf/ 请求到后端
      location /springboot01u2zqkf/ {
          proxy_pass http://springboot-app:8080/springboot01u2zqkf/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_method POST;
          proxy_set_header Content-Type "application/x-www-form-urlencoded";
      }

      # ✅ 保留：代理 /login 请求（兼容前端错误写法）
      location = /login {
          proxy_pass http://springboot-app:8080/springboot01u2zqkf/users/login;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_method POST;
          proxy_set_header Content-Type "application/x-www-form-urlencoded";
      }

      # 静态资源
      location / {
          index index.html index.htm;
          try_files $uri $uri/ /index.html;
      }

      # 静态资源缓存
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
      }
  }